<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Đặt lịch khám | MedBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/appointment.css">
</head>

<body>
    <div id="site-nav"></div>
    <main class="bg-soft">
        <section class="container section-padding">
            <div class="text-center mb-4"><span class="eyebrow">Đặt lịch trực tuyến</span>
                <h1>Đặt lịch khám bệnh</h1>
                <p class="text-muted">Hoàn tất thông tin để được xác nhận lịch hẹn nhanh chóng.</p>
            </div>
            <div class="booking-steps">
                <div class="step active"><b>1</b><span>Chọn bác sĩ</span></div>
                <div class="step"><b>2</b><span>Chọn ngày</span></div>
                <div class="step"><b>3</b><span>Chọn giờ</span></div>
                <div class="step"><b>4</b><span>Xác nhận</span></div>
            </div>
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="booking-card" id="booking-content"></div>
                </div>
                <aside class="col-lg-4">
                    <div class="summary-card" id="booking-summary"></div>
                </aside>
            </div>
        </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/appointment.js"></script>
</body>

</html>

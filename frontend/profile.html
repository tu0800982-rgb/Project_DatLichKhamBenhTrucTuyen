<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hồ sơ cá nhân | MedBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div id="site-nav"></div>
    <main class="bg-soft">
        <section class="container section-padding">
            <div class="profile-head">
                <h1>Hồ sơ cá nhân</h1>
                <p>Quản lý thông tin và lịch hẹn khám của bạn</p>
            </div>
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="profile-card" id="profile-info"></div>
                </div>
                <div class="col-lg-8">
                    <div class="history-card mb-4">
                        <h3>Lịch hẹn sắp tới</h3>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Bác sĩ</th>
                                        <th>Chuyên khoa</th>
                                        <th>Ngày khám</th>
                                        <th>Giờ khám</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="upcoming-appointments"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="history-card">
                        <h3>Lịch sử khám</h3>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Bác sĩ</th>
                                        <th>Ngày khám</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="past-appointments"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>

</html>

<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Danh sách bác sĩ | MedBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/doctor.css">
</head>

<body>
    <div id="site-nav"></div>
    <main>
        <section class="page-header">
            <div class="container"><span class="eyebrow">Đội ngũ chuyên gia</span>
                <h1>Tìm bác sĩ phù hợp</h1>
                <p>Hơn 500 bác sĩ giàu kinh nghiệm, tận tâm chăm sóc sức khỏe của bạn.</p>
            </div>
        </section>
        <section class="container section-padding">
            <div class="search-panel">
                <div class="input-group"><span class="input-group-text"><i
                            class="fa-solid fa-magnifying-glass"></i></span><input id="doctor-search"
                        class="form-control" placeholder="Tìm theo tên bác sĩ hoặc chuyên khoa..."></div><select
                    id="specialty-filter" class="form-select">
                    <option value="">Tất cả chuyên khoa</option>
                </select>
            </div>
            <p class="result-count" id="result-count"></p>
            <div class="row g-4" id="doctor-list"></div>
        </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/doctor.js"></script>
</body>

</html>

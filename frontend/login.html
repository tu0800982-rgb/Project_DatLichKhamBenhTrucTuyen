<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Đăng nhập | MedBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="auth-body">
    <main class="auth-wrap"><a class="brand auth-brand" href="index.html"><i class="fa-solid fa-heart-pulse"></i>
            Med<span>Booking</span></a>
        <div class="auth-card">
            <div class="text-center mb-4">
                <h1>Chào mừng trở lại</h1>
                <p>Đăng nhập để quản lý lịch hẹn của bạn</p>
            </div>
            <form id="login-form"><label>Email</label>
                <div class="input-group mb-3"><span class="input-group-text"><i
                            class="fa-regular fa-envelope"></i></span><input class="form-control" type="email"
                        id="login-email" placeholder="email@example.com" required></div><label>Mật khẩu</label>
                <div class="input-group mb-2"><span class="input-group-text"><i
                            class="fa-solid fa-lock"></i></span><input class="form-control" type="password"
                        id="login-password" placeholder="Nhập mật khẩu" required></div>
                <div class="text-end mb-4"><a href="#" class="small">Quên mật khẩu?</a></div><button
                    class="btn btn-primary w-100 py-2" type="submit">Đăng nhập</button>
            </form>
            <p class="text-center mt-4 mb-0">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            <p class="demo-note"><i class="fa-solid fa-circle-info"></i> Demo: dùng bất kỳ email và mật khẩu.</p>
        </div><a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>
    </main>
    <script src="js/mock-data.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>

<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Đăng ký | MedBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="auth-body">
    <main class="auth-wrap"><a class="brand auth-brand" href="index.html"><i class="fa-solid fa-heart-pulse"></i>
            Med<span>Booking</span></a>
        <div class="auth-card auth-card-wide">
            <div class="text-center mb-4">
                <h1>Tạo tài khoản</h1>
                <p>Đăng ký để trải nghiệm dịch vụ MedBooking</p>
            </div>
            <form id="register-form"><label>Họ và tên</label><input class="form-control mb-3" id="register-name"
                    placeholder="Nguyễn Văn A" required><label>Email</label><input class="form-control mb-3"
                    id="register-email" type="email" placeholder="email@example.com" required><label>Số điện
                    thoại</label><input class="form-control mb-3" id="register-phone" type="tel"
                    placeholder="0901 234 567" required><label>Mật khẩu</label><input class="form-control mb-3"
                    id="register-password" type="password" placeholder="Tối thiểu 6 ký tự" minlength="6"
                    required><label>Xác nhận mật khẩu</label><input class="form-control mb-4" id="register-confirm"
                    type="password" placeholder="Nhập lại mật khẩu" required><button class="btn btn-primary w-100 py-2"
                    type="submit">Đăng ký</button></form>
            <p class="text-center mt-4 mb-0">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        </div><a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>
    </main>
    <script src="js/mock-data.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>

spring.config.import=optional:file:../.env[.properties]

server.port=${SPRING_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medbooking}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.jwt.secret=${JWT_SECRET:development-secret-development-secret-32}
app.jwt.expiration-ms=604800000
